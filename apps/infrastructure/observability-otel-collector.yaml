apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mathtrail-observability-otel-collector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: mathtrail
  sources:
    - repoURL: https://MathTrail.github.io/charts/charts
      chart: opentelemetry-collector
      targetRevision: 0.145.0
      helm:
        releaseName: otel-collector
        valueFiles:
          - $values/values/otel-collector-values.yaml
    - repoURL: https://github.com/MathTrail/infra-observability
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
