apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mathtrail-observability-alloy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: mathtrail
  sources:
    - repoURL: https://MathTrail.github.io/charts/charts
      chart: k8s-monitoring
      targetRevision: 3.8.0
      helm:
        releaseName: alloy
        valueFiles:
          - $values/values/alloy-values.yaml
    - repoURL: https://github.com/MathTrail/infra-observability
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
