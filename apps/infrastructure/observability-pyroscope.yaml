apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mathtrail-observability-pyroscope
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: mathtrail
  sources:
    - repoURL: https://MathTrail.github.io/charts/charts
      chart: pyroscope
      targetRevision: 1.18.1
      helm:
        releaseName: pyroscope
        valueFiles:
          - $values/values/pyroscope-values.yaml
    - repoURL: https://github.com/MathTrail/infra-observability
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
