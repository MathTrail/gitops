apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mathtrail-observability-base
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: mathtrail
  source:
    repoURL: https://github.com/MathTrail/infra-observability
    path: manifests
    targetRevision: main
    helm:
      releaseName: infra-base
      valuesObject:
        namespace: mathtrail
        monitoringNamespace: monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
